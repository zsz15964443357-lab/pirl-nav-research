scenario_family: semantic_distractor
purpose: 高风险语义对象存在，但未来不进入无人机路径，用于防止策略过度保守。
map:
  size_m: [12.0, 12.0]
  nominal_height_m: 1.5
distractor_objects:
  semantic_classes: [pedestrian, cart, mobile_robot]
  count_by_difficulty:
    easy: [1, 1]
    medium: [2, 3]
    hard: [3, 5]
  non_conflicting_future: true
review_notes:
  - 对象语义可以高风险，但未来轨迹不应与 UAV 路径冲突。
  - 如果策略明显绕远，说明它可能只是学到了语义保守性。
  - 重点审查 detour、time-to-goal、false avoidance 和 jerk。