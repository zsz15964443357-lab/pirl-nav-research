scenario_family: intent_ambiguous
purpose: 同一对象早期轨迹相似，但未来存在多种可能意图，用于验证概率意图风险。
map:
  size_m: [12.0, 12.0]
  nominal_height_m: 1.5
objects:
  semantic_classes: [pedestrian, cart, mobile_robot]
  initial_behavior: stationary_or_slow
  future_modes:
    stay: 0.40
    cross_left: 0.25
    cross_right: 0.25
    start_forward: 0.10
review_notes:
  - 前几秒轨迹应保持模糊，不能一开始就显露真实意图。
  - 多模态预测应覆盖真实未来轨迹。
  - TTC 在对象静止时可能低估风险，语义风险可能过度保守。