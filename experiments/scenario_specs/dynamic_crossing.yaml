scenario_family: dynamic_crossing
purpose: 验证普通动态避障能力，为 TTC、VO、MPC、普通 PPO 提供公平对照。
map:
  size_m: [12.0, 12.0]
  nominal_height_m: 1.5
dynamic_objects:
  count_by_difficulty:
    easy: [1, 1]
    medium: [2, 3]
    hard: [3, 5]
  speed_mps:
    easy: [0.3, 0.8]
    medium: [0.5, 1.2]
    hard: [0.8, 1.8]
  crossing_angle_deg: [45, 135]
  starts_moving_at_reset: true
review_notes:
  - 对象从 episode 开始即运动。
  - 该场景用于证明 PIRL-Nav 在普通动态避障中不退化。
  - 不应设计成只有 PIRL-Nav 才能处理。