scenario_family: occluded_emergence
purpose: 对象从门口、拐角、箱体或货架遮挡后突然进入无人机视野。
map:
  size_m: [12.0, 12.0]
  nominal_height_m: 1.5
occluders:
  shapes: [wall, box, shelf]
  length_m: [1.0, 4.0]
emerging_objects:
  semantic_classes: [pedestrian, cart, mobile_robot]
  speed_mps:
    easy: [0.3, 0.8]
    medium: [0.5, 1.2]
    hard: [0.8, 1.6]
  detection_delay_s:
    easy: [0.0, 0.1]
    medium: [0.1, 0.3]
    hard: [0.2, 0.5]
review_notes:
  - 对象在关键时刻前必须确实不可见。
  - 遮挡物必须位于无人机名义路径附近。
  - 场景应检查策略是否在遮挡边缘前主动留出空间。