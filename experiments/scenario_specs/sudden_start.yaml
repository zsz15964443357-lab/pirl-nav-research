scenario_family: sudden_start
purpose: 当前静止对象在随机时刻启动或横穿，用于验证潜在运动意图风险。
map:
  size_m: [12.0, 12.0]
  nominal_height_m: 1.5
uav:
  start_region: [[-5.5, -4.0], [-4.0, 4.0]]
  goal_region: [[4.0, -4.0], [5.5, 4.0]]
  radius_m: 0.25
  max_speed_mps: [1.0, 2.0]
objects:
  semantic_classes: [pedestrian, cart, mobile_robot]
  count_by_difficulty:
    easy: [1, 1]
    medium: [1, 3]
    hard: [3, 5]
  speed_mps:
    easy: [0.3, 0.8]
    medium: [0.5, 1.2]
    hard: [0.8, 1.8]
  start_time_s:
    easy: [3.0, 6.0]
    medium: [1.5, 5.0]
    hard: [0.5, 3.0]
intent_modes:
  stay: 0.35
  start_forward: 0.20
  cross_left: 0.15
  cross_right: 0.15
  yield: 0.10
  stop_after_start: 0.05
review_notes:
  - 风险对象未来轨迹必须与无人机名义走廊有潜在交集。
  - 不能所有对象都启动，否则策略会过度保守。
  - semantic_distractor 场景用于反向约束误报。