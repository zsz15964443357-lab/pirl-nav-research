scenario_family: static_clutter
purpose: 验证基础导航与静态避障能力。
map:
  size_m: [12.0, 12.0]
  nominal_height_m: 1.5
uav:
  radius_m: 0.25
  max_speed_mps: [1.0, 2.0]
static_obstacles:
  count_by_difficulty:
    easy: [2, 4]
    medium: [4, 8]
    hard: [8, 14]
  shapes: [box, cylinder]
  size_m: [0.3, 1.2]
review_notes:
  - 起点到终点必须存在可行路径。
  - hard 可以窄，但不能必撞无解。
  - 该场景不是创新点，只用于验证基本导航能力。